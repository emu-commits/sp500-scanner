name: "1. Fetch Candle Data"

on:
  # Run at 8am UTC Mon-Fri (market is open, fresh data)
  schedule:
    - cron: "0 8 * * 1-5"
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # Restore previously cached candle data (so we don't re-fetch already-good tickers)
      - name: Restore candle cache
        uses: actions/cache@v4
        with:
          path: cache/
          key: candles-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            candles-${{ runner.os }}-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pandas numpy lxml html5lib beautifulsoup4

      - name: Fetch candle data
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
        run: python fetch.py

      # Save cache so the analyze workflow can access it
      - name: Upload candle cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: candle-cache
          path: cache/candles.json
          retention-days: 2
          overwrite: true
