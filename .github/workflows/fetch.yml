name: "1. Fetch Candle Data"

on:
  schedule:
    - cron: "0 8 * * 1-5"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy lxml html5lib beautifulsoup4

      - name: Fetch candle data
        run: python fetch.py

      - name: Upload candle cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: candle-cache
          path: cache/candles.json
          retention-days: 2
          overwrite: true
